<script>
// 12. Encuentra el Número Más Pequeño y Más Grande

// Dado un array de números, escribe una función que devuelva el número más pequeño 
// y el número más grande en el array como un array de dos elementos.
// Ejemplo: [12, 5, 7, 19, 1] debería devolver [1, 19].

let numeros = [12, 5, 7, 19, 1]
let pequeñoGrande = []
let numeroMasGrande = numeros[0]
let numeroMasPequeño = numeros[0]

for (const numero of numeros) {
    if (numero > numeroMasGrande) {
        numeroMasGrande = numero
    } else if (numero < numeroMasPequeño) {
        numeroMasPequeño = numero        
    }
}
pequeñoGrande.push(numeroMasPequeño,numeroMasGrande)
console.log(pequeñoGrande);

</script>
