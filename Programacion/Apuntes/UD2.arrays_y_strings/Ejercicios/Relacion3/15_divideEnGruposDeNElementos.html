<script>
    // 15. Divide en Grupos de N Elementos

    // Dado un array y un número N, divide el array en sub-arrays de N elementos. Si quedan menos de N elementos al final, 
    // incluye esos elementos en el último sub-array.
    // Ejemplo: [1, 2, 3, 4, 5, 6, 7, 8] con N = 3 debería devolver [[1, 2, 3], [4, 5, 6], [7, 8]].

    let listaNumeros = [1, 2, 3, 4, 5, 6, 7, 8]
    let N = 3
    let subArrays = []
    let arrayN = []
    const LONGITUD = listaNumeros.length

    while (listaNumeros != 0) {
        for (let j = 0; j < N && listaNumeros.length != 0; j++) {
            arrayN.push(listaNumeros[0])
            listaNumeros.shift()
        }
        subArrays.push(arrayN)
        arrayN = []
    }
    console.log(subArrays);


</script>
