<script>
    // 2. Sistema de Puntuación de un Videojuego

    // Escribe un programa que gestione las puntuaciones de los jugadores en un videojuego utilizando dos arrays:
    //  uno para los nombres de los jugadores y otro para sus respectivas puntuaciones. El programa debe funcionar de la siguiente manera:

    // Crea dos arrays:

    // Uno para almacenar los nombres de los últimos 5 jugadores.
    // Otro para almacenar las puntuaciones correspondientes de esos jugadores.
    // El programa debe mostrar un menú con las siguientes opciones:

    // Añadir un nuevo jugador y su puntuación: El usuario debe poder ingresar el nombre del jugador y su puntuación. 
    // La información del jugador más antiguo (el primer elemento de ambos arrays) debe ser eliminada y 
    // los nuevos datos deben añadirse al final de ambos arrays.
    // Mostrar los jugadores y sus puntuaciones actuales: Se deben mostrar los nombres de los jugadores junto con sus respectivas puntuaciones.
    // Salir del programa: Terminar la ejecución del programa.

    let jugadores = ["jugador 1", "jugador 2", "jugador 3", "jugador 4", "jugador 5"]
    let puntuaciones = [100, 150, 25, 100, 175]

    let puntuacionNuevoJugador = 0
    let nuevoJugador = ""

    while (nuevoJugador != "SALIR DEL PROGRAMA") {
        nuevoJugador = prompt("Añade el nombre del nuevo jugador") 
        if (nuevoJugador != "SALIR DEL PROGRAMA") {
            puntuacionNuevoJugador = prompt("Introduce la puntuación de " + nuevoJugador)
            while (puntuacionNuevoJugador < 0 || puntuacionNuevoJugador > 1000 || isNaN(puntuacionNuevoJugador)) {
                puntuacionNuevoJugador = prompt("Puntuación no válida.\nIntroduce un valor entre 0 y 1000 para " + nuevoJugador)
            }
            jugadores.shift()
            jugadores.push(nuevoJugador)
            puntuaciones.shift()
            puntuaciones.push(puntuacionNuevoJugador)
            for (let i = 0; i < jugadores.length && jugadores.length == puntuaciones.length; i++) {
                console.log(`Jugador: ${jugadores[i]} = ${puntuaciones[i]} puntos`);
            }
        } else {
            console.log("Fin del programa");
        }
    }

</script>
