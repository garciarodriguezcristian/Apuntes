<script>
// 3. Filtro de mayores de edad

// Escribe una función que reciba una matriz de nombres y edades, y devuelva una lista con los nombres de las personas mayores de edad(18 o más años).

// Ejemplo:

// Entrada:

// const personas = [
//     ["Ana", 17],
//     ["Luis", 20],
//     ["Marta", 18],
//     ["Carlos", 15],
//     ["Elena", 25],
//     ];
//     mayoresDeEdad(personas);
//     Salida:

//     ["Luis", "Marta", "Elena"]

function mayoresDeEdad(datosPersonas) {
    let mayorEdad = 18
    let personasMayores = []
    for (let i = 0; i < datosPersonas.length; i++) {
        if (datosPersonas[i][1] >= mayorEdad) {
            personasMayores.push(datosPersonas[i][0])
        }        
    }
    return personasMayores
}

//================= MAIN =================//
const personas = [
["Ana", 17],
["Luis", 20],
["Marta", 18],
["Carlos", 15],
["Elena", 25],
];
console.log(mayoresDeEdad(personas));
</script>
