<script>
// 19. Capitalizar la primera letra de una palabra

// Crea una función llamada capitalizarPrimeraLetra que reciba una palabra y devuelva la misma palabra con la primera letra en mayúscula.
// Investiga el uso de toUpperCase().

function capitalizarPrimeraLetra(palabra) {
    let primeraLetra = palabra[0]
    let letraCapitalizada = primeraLetra.toUpperCase()
    let palabraModificada = letraCapitalizada
    for (let i = 1; i < palabra.length; i++) {
        palabraModificada += palabra[i]
    }
    return palabraModificada
}
let palabraSinCapitalizar = "elisabeth"
console.log(capitalizarPrimeraLetra(palabraSinCapitalizar));

</script>
