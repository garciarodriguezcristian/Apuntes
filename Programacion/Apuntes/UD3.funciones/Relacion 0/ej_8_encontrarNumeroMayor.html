<script>

    function mayor(numero1, numero2) {
        let numeroMayor = numero1
        if (numero1 < numero2) {
            numeroMayor = numero2
        } return numeroMayor
    }
    // ================== MAIN ================== //

    let numeroMayor = mayor(6, 8)
    console.log(numeroMayor);

</script>
