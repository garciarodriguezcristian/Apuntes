<script>
    // 14. Calcular el promedio de un array
    // Crea una función llamada promedioArray que reciba un array de números y devuelva su promedio.

    function sumarArray(numeros) {
        let suma = 0
        for (const numero of numeros) {
            suma += numero
        }
        return suma
    }
// Reutilizo mi funcion anterior sumarArray (La de arriba).

    function promedioArray(array) {
        let sumaArray = sumarArray(array)
        let promedio = sumaArray / array.length
        return promedio
    }

    // ================== MAIN ================== //

    let array = [2, 3, 4, 5, 6]
    let promedio = promedioArray(array)
    console.log(promedio);

</script>
