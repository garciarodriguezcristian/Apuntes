<script>
    // 6. Decir si un número es positivo o negativo

    // Crea una función llamada esPositivo que reciba un número y devuelva true o false dependiendo de su valor.

    function esPositivo(numero) {
        let esPositivo = true
        if (numero < 0) {
            esPositivo = false
        } else {
            esPositivo
        }
        return esPositivo
    }
    let numeroUsuario = prompt("Introduce un numero")
    let numeroEsPositivo = esPositivo(numeroUsuario)
    console.log(numeroEsPositivo);
    
</script>
