<script>
    // 7. Juego: Adivina el Número

    // Crea una función juegoAdivinaNumero que genere un número aleatorio entre 1 y 10.
    // Pídele al usuario que adivine el número, y dile si el número que ingresó es menor, mayor o igual al número generado.

    function juegoAdivinaNumero() {
        let numeroAleatorio = Math.floor(Math.random() * 10) + 1
        return numeroAleatorio
    }

    function mayorMenorIgual(numeroAdivinar, numeroUsuario) {
        let resultado = ""
        if (numeroUsuario > numeroAdivinar) {
            resultado = "mayor"
        } else if (resultado < numeroAdivinar) {
            resultado = "menor"
        } else {
            resultado = "igual"
        }
        return resultado
    }
    let numeroAdivinar = juegoAdivinaNumero()
    let numeroUsuario = prompt("Introduce un número")
    let resultado = mayorMenorIgual(numeroAdivinar,numeroUsuario)
    console.log(`${numeroUsuario} es ${resultado} que ${numeroAdivinar }`);
    


</script>
