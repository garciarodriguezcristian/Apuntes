<script>
    // 9. Generar una Contraseña Aleatoria de Longitud Fija

    // Escribe una función generarContraseña que reciba un número longitud y devuelva una cadena de caracteres aleatorios (formada por letras y números) de esa longitud.
    //  Por ejemplo, si longitud es 8, podría devolver algo como a7b3f2d8. Puedes usar un array de letras y números para ir eligiendo de forma aleatoria.

    function generarContraseña(longitud) {
        let caracteres = "abcdefghijklmnñopqrstuvwxyz1234567890"
        let caracterAleatorio = ""
        let contraseña = ""
        for (let i = 0; i < longitud; i++) {
            caracterAleatorio = Math.floor(Math.random() * caracteres.length)
            contraseña += caracteres[caracterAleatorio]
        }
        return contraseña
    }

    //------------------- MAIN --------------------//

let longitudContraseña = 8
let contraseña = generarContraseña(longitudContraseña)
console.log(contraseña);

</script>
