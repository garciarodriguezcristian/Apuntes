<script>
    // 10. Simular una Carta de una Baraja

    // Escribe una función cartaAleatoria que devuelva una carta aleatoria de una baraja (con un número del 1 al 13, que representaría el valor, y uno de los cuatro palos:
    // corazones, diamantes, tréboles o picas).


    function cartaAleatoria() {
        let palos = ["♥️", "♦️", "♠️", "♣️"]
        let numeroCarta = Math.floor(Math.random() * 13) + 1
        let paloElegido = palos[Math.floor(Math.random() * palos.length)]
        return numeroCarta + paloElegido
    }

    console.log(cartaAleatoria());

</script>
