<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical Roll</title>
</head>
<body>
    <header>
    </header>
    <main>
        <h2>Formulario de registro</h2>
        <form action="#" method="post"></form>
        <input type="text" name="nombre" placeholder="Nombre" required minlength="2">
        <input type="email" name="email" placeholder="tu@correo.com" required>
        <input type="number" name="telefono" maxlength="9" required pattern="\d{9}">
        <input type="date" name="fecha" required>
        <select name="pais">
            <option value="es">España</option>
            <option value="it">Italia</option>
            <option value="fr">Francia</option>
            <option value="en">Inglaterra</option>
        </select>
        <input type="checkbox" name="acepto" required>Acepto terminos y condiciones
        <button type="submit">Enviar</button>
    </main>
    <footer></footer>
</body>
</html>
