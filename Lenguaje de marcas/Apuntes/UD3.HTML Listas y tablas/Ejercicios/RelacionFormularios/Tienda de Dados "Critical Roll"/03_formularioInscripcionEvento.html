<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noche del crítico</title>
</head>
<body>
    <h2>Formulario de registro</h2>
    <form action="#" method="post"></form>
    <p>Datos personales</p>

    <input type="text" name="nombre" placeholder="Nombre" required>
    <input type="email" name="correo" placeholder="tu@correo.com" required>

    ¿Traeras tus propios dados?
    <input type="radio" name="" value="si">Si
    <input type="radio" name="" value="no">No

    <p>Actividades del evento</p>
    <input type="checkbox" name="torneo">Torneo de d20
    <input type="checkbox" name="taller">Taller de pintura de dados
    <input type="checkbox" name="iniciacion">Partida de iniciación a Dungeons & Dragons
    <input type="checkbox" name="intercambio">Zona libre de intercambio de colecciones

    <p>Seccion de horario</p>
    <select name="horario">
        <option value="18">18:00 - 20:00</option>
        <option value="20">20:00 - 22:00</option>
        <option value="22">22:00 - 00:00</option>
    </select>

    <p>Comentarios opcionales</p>
    <textarea name="" cols="30" rows="10"></textarea>

    <input type="checkbox" name="normas">Acepto las normas del evento
    <button type="submit">Enviar</button>

</body>
</html>
